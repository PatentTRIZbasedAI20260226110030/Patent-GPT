name: Bug Report
description: Report a bug in Patent-GPT
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `uvicorn app.main:app`
        2. Send POST to /api/v1/patent/generate with body ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Traceback
      description: Paste any relevant logs or traceback.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - TRIZ Idea Generator
        - Patent Searcher (RAG)
        - Reasoning Agent (LangGraph)
        - Draft Generator
        - FastAPI / API Layer
        - KIPRISplus Client
        - Configuration / Environment
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11.9"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help.
